[graph]
targets = []
all-features = true

[output]
feature-depth = 1

[advisories]
ignore = []
unmaintained = "workspace"

[bans]
multiple-versions = "allow"

[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "BSL-1.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "MPL-2.0",
  "Unicode-3.0",
]
exceptions = [
  # burn, burn-store, cubecl, and wgpu stack
  { allow = ["CC0-1.0"], name = "hexf-parse" },
  { allow = ["ISC"], name = "libloading" },
  { allow = ["Zlib"], name = "foldhash" },
  { allow = ["Zlib"], name = "slotmap" },

  # dev/test stack via magika and ort rustls TLS
  { allow = ["CDLA-Permissive-2.0"], name = "webpki-roots" },
  { allow = ["ISC"], name = "ring" },
  { allow = ["ISC"], name = "rustls-webpki" },
  { allow = ["ISC"], name = "untrusted" },
]
